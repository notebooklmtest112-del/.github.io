<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --text: #f0ede6;
      --accent: #c8a96e;
      --muted: #4a4a5a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200, 169, 110, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200, 169, 110, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200, 169, 110, 0.08) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 1;
      animation: fadeUp 1s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .label {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
      animation: fadeUp 1s ease 0.2s both;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(5rem, 15vw, 12rem);
      font-weight: 700;
      line-height: 0.9;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text) 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp 1s ease 0.1s both;
    }

    .line {
      width: 60px;
      height: 1px;
      background: var(--accent);
      margin: 2rem auto;
      animation: expand 1s ease 0.5s both;
    }

    @keyframes expand {
      from { width: 0; opacity: 0; }
      to   { width: 60px; opacity: 1; }
    }

    .sub {
      font-weight: 300;
      font-size: 1rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      animation: fadeUp 1s ease 0.6s both;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow"></div>
  <div class="container">
    <p class="label">Welcome</p>
    <h1>Hello</h1>
    <div class="line"></div>
    <p class="sub">index.html · はじめまして</p>
  </div>
</body>
</html>
